name: build-desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter config --enable-windows-desktop
      - run: flutter create --platforms=windows --project-name bitaps_vpn .
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Portable zip
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath bitaps-windows-x64.zip -Force
      - name: Installer (Inno Setup)
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" pkg\installer.iss'
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Последняя сборка
          files: |
            bitaps-setup.exe
            bitaps-windows-x64.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build deps
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libfuse2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter config --enable-linux-desktop
      - run: flutter create --platforms=linux --project-name bitaps_vpn .
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Portable tar.gz
        run: tar -czf bitaps-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - name: AppImage
        run: bash pkg/build-appimage.sh
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Последняя сборка
          files: |
            bitaps-x86_64.AppImage
            bitaps-linux-x64.tar.gz

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter config --enable-macos-desktop
      - run: flutter create --platforms=macos --project-name bitaps_vpn .
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package DMG
        run: |
          set -e
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          echo "app: $APP"
          mkdir -p dmgroot
          cp -R "$APP" dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname "bitaps VPN" -srcfolder dmgroot -ov -format UDZO bitaps-macos.dmg
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Последняя сборка
          files: bitaps-macos.dmg
