name: build-desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter config --enable-windows-desktop
      - run: flutter create --org com.bitapsvpn --platforms=windows,android --project-name bitaps_vpn .
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      - run: flutter build windows --release
      - name: Portable zip
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath bitaps-windows-x64.zip -Force
      - name: Installer (Inno Setup)
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" pkg\installer.iss'
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Последняя сборка
          files: |
            bitaps-setup.exe
            bitaps-windows-x64.zip

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build deps
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libfuse2
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter config --enable-linux-desktop
      - run: flutter create --org com.bitapsvpn --platforms=linux --project-name bitaps_vpn .
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Portable tar.gz
        run: tar -czf bitaps-linux-x64.tar.gz -C build/linux/x64/release/bundle .
      - name: AppImage
        run: bash pkg/build-appimage.sh
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Последняя сборка
          files: |
            bitaps-x86_64.AppImage
            bitaps-linux-x64.tar.gz

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter config --enable-macos-desktop
      - run: flutter create --org com.bitapsvpn --platforms=macos,android --project-name bitaps_vpn .
      - name: Inject network.client entitlement (sandboxed release needs it for HTTP)
        run: |
          for e in macos/Runner/Release.entitlements macos/Runner/DebugProfile.entitlements; do
            [ -f "$e" ] && /usr/bin/perl -0pi -e 's/(<\/dict>)/\t<key>com.apple.security.network.client<\/key>\n\t<true\/>\n$1/ unless /network\.client/' "$e"
          done
          grep -q "network.client" macos/Runner/Release.entitlements && echo "network.client ok" || (echo "ENTITLEMENT MISSING" && exit 1)
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      - run: flutter build macos --release
      - name: Package DMG
        run: |
          set -e
          APP=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          echo "app: $APP"
          mkdir -p dmgroot
          cp -R "$APP" dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname "bitaps VPN" -srcfolder dmgroot -ov -format UDZO bitaps-macos.dmg
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Последняя сборка
          files: bitaps-macos.dmg

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter create --org com.bitapsvpn --platforms=android --project-name bitaps_vpn .
      - name: Patch Android manifest (INTERNET) + minSdk 24
        run: |
          perl -0pi -e 's/(<manifest\b[^>]*>)/$1\n    <uses-permission android:name="android.permission.INTERNET"\/>/' android/app/src/main/AndroidManifest.xml
          grep -q "android.permission.INTERNET" android/app/src/main/AndroidManifest.xml && echo "INTERNET ok" || (echo "INTERNET MISSING" && exit 1)
          sed -i.bak 's/minSdk = flutter.minSdkVersion/minSdk = 24/; s/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' android/app/build.gradle.kts 2>/dev/null || true
          sed -i.bak 's/minSdk = flutter.minSdkVersion/minSdk = 24/; s/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' android/app/build.gradle 2>/dev/null || true
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      - run: yes | flutter doctor --android-licenses || true
      - run: flutter build apk --release
      - run: cp build/app/outputs/flutter-apk/app-release.apk bitaps.apk
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Последняя сборка
          files: bitaps.apk
